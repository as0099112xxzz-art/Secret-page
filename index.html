<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin-top:10px;
}

#content{
display:none;
padding-top:40px;
}

h1{color:red;}

#zahraaName{
font-size:30px;
color:pink;
margin-bottom:10px;
}

.card-container{
display:none;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.card{
width:120px;
height:80px;
background:#111;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 15px red;
transition:0.3s;
font-size:30px;
}

.card:hover{
transform:scale(1.1);
}

#cardsMessage{
margin-top:20px;
font-size:22px;
color:pink;
min-height:30px;
}

.explosion-heart{
position:fixed;
font-size:20px;
animation:explode 1s ease-out forwards;
pointer-events:none;
}

@keyframes explode{
0%{transform:scale(0.5);opacity:1;}
100%{transform:translate(var(--x),var(--y)) scale(2);opacity:0;}
}

#loader{
display:none;
margin-top:20px;
font-size:22px;
color:pink;
}

#truthContent{
display:none;
margin-top:20px;
font-size:22px;
line-height:1.8;
max-width:700px;
margin-left:auto;
margin-right:auto;
}
</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass" placeholder="الباسورد هنا">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<div id="zahraaName">Zahraa ❤️</div>

<h1>❤️ من يوم 8 أبريل 2025 ❤️</h1>

<div id="counter"></div>

<p id="text" style="white-space:pre-line; line-height:1.8; width:85%; margin:auto;"></p>

<div class="card-container" id="cardsSection">
<div class="card" onclick="showCardWord(this)">❤️</div>
<div class="card" onclick="showCardWord(this)">💕</div>
<div class="card" onclick="showCardWord(this)">💖</div>
<div class="card" onclick="showCardWord(this)">💘</div>
<div class="card" onclick="showCardWord(this)">💞</div>
<div class="card" onclick="showCardWord(this)">💗</div>
</div>

<div id="cardsMessage"></div>

<button onclick="truthTime()">وقت الصراحة ❤️</button>
<div id="loader">استني بس ثواني يا حياتي ⏳</div>

<div id="truthContent">
حبيتك ف وقت كنت رافض فيه الحب  
ووصل بيا الحال اني اعشقك ومقدرش استغني عنك  
حبك بقي ادمان  
هنعافر وهنستحمل مع بعض عشان نكون لبعض  
مقدرش ابص لغيرك  
قلبي رافض كل البنات  
عاوزك انتي ❤️
</div>

<audio id="bgMusic" loop>
<source src="music.mp3" type="audio/mpeg">
</audio>

</div>

<script>

function checkPass(){
var password=document.getElementById("pass").value;
if(password==="love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
document.getElementById("bgMusic").play();
startCounter();
typeWriter();
}else{
alert("الباسورد غلط 😢");
}
}

function startCounter(){
var startDate=new Date("April 8, 2025 00:00:00").getTime();
setInterval(function(){
var now=new Date().getTime();
var distance=now-startDate;
var days=Math.floor(distance/(1000*60*60*24));
var hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
var minutes=Math.floor((distance%(1000*60*60))/(1000*60));
var seconds=Math.floor((distance%(1000*60))/1000);

document.getElementById("counter").innerHTML=
"عدّى علينا: "+days+" يوم "+
hours+" ساعة "+
minutes+" دقيقة "+
seconds+" ثانية ❤️";
},1000);
}

var i=0;
var txt="من يوم ما عرفتك وأنا حاسس إن الدنيا بقت أهدى وأجمل ❤️\n\nكل يوم بيعدي وإنتِ فيه بيأكدلي إني محظوظ.\nوجودك في حياتي فرق معايا في كل حاجة.\n\nمش بس بحبك…\nأنا بختارك كل يوم.\nوبتمنى نكمل المشوار سوا لآخر العمر 💕";

function typeWriter(){
if(i<txt.length){
document.getElementById("text").innerHTML+=txt.charAt(i);
i++;
setTimeout(typeWriter,45);
}else{
document.getElementById("cardsSection").style.display="flex";
}
}

var words=["محبيتش","ولا","هحب","حد","قدك","❤️"];
var currentWord=0;

function showCardWord(card){
if(currentWord<words.length){
document.getElementById("cardsMessage").innerHTML+=words[currentWord]+" ";
explodeHearts(card);
card.style.visibility="hidden";
currentWord++;
if(currentWord===words.length){
bigExplosion();
}
}
}

function explodeHearts(element){
for(let j=0;j<15;j++){
let heart=document.createElement("div");
heart.className="explosion-heart";
heart.innerHTML="❤️";
heart.style.left=element.getBoundingClientRect().left+40+"px";
heart.style.top=element.getBoundingClientRect().top+40+"px";
heart.style.setProperty("--x",(Math.random()*300-150)+"px");
heart.style.setProperty("--y",(Math.random()*300-150)+"px");
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),1000);
}
}

function bigExplosion(){
for(let k=0;k<40;k++){
let heart=document.createElement("div");
heart.className="explosion-heart";
heart.innerHTML="💖";
heart.style.left="50%";
heart.style.top="50%";
heart.style.setProperty("--x",(Math.random()*600-300)+"px");
heart.style.setProperty("--y",(Math.random()*600-300)+"px");
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),1000);
}
}

function truthTime(){
document.getElementById("loader").style.display="block";
document.getElementById("truthContent").style.display="none";
setTimeout(function(){
document.getElementById("loader").style.display="none";
document.getElementById("truthContent").style.display="block";
},4000);
}

</script>

</body>
</html>
