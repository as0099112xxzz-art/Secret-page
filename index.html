   <!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>For You ❤️</title>

<style>
body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow-x:hidden;
}

#login{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
}

input, textarea{
padding:10px;
font-size:18px;
border-radius:10px;
border:none;
width:80%;
max-width:400px;
}

button{
padding:12px 22px;
font-size:18px;
border-radius:12px;
border:none;
background:linear-gradient(45deg, red, pink);
color:white;
cursor:pointer;
box-shadow:0 0 15px red;
margin-top:10px;
}

#content{
display:none;
padding-top:40px;
}

h1{
color:red;
}

#zahraaName{
font-size:30px;
color:pink;
margin-bottom:10px;
}

.card-container{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:15px;
margin-top:30px;
}

.card{
width:120px;
height:80px;
background:#111;
border-radius:15px;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
box-shadow:0 0 15px red;
transition:0.3s;
font-size:30px;
}

.card:hover{
transform:scale(1.1);
}

#cardsMessage{
margin-top:20px;
font-size:22px;
color:pink;
display:none;
}

#truthContent{
display:none;
margin-top:20px;
font-size:22px;
line-height:1.8;
max-width:700px;
margin-left:auto;
margin-right:auto;
}

#loader{
display:none;
margin-top:20px;
font-size:22px;
color:pink;
}

textarea{
margin-top:15px;
}

#herMessage{
margin-top:15px;
color:pink;
font-size:20px;
}
</style>
</head>

<body>

<div id="login">
<h2>اكتب الباسورد ❤️</h2>
<input type="password" id="pass" placeholder="الباسورد هنا">
<br><br>
<button onclick="checkPass()">دخول</button>
</div>

<div id="content">

<div id="zahraaName">Zahraa ❤️</div>

<h1>❤️ من يوم 8 أبريل 2025 ❤️</h1>

<div id="counter"></div>

<!-- الكروت -->
<div class="card-container">
<div class="card" onclick="showCardMessage()">❤️</div>
<div class="card" onclick="showCardMessage()">💕</div>
<div class="card" onclick="showCardMessage()">💖</div>
</div>

<div id="cardsMessage">
محبيتش ولا هحب حد قدك ❤️
</div>

<!-- وقت الصراحة -->
<button onclick="truthTime()">وقت الصراحة ❤️</button>

<div id="loader">استني بس ثواني يا حياتي ⏳</div>

<div id="truthContent">
حبيتك ف وقت كنت رافض فيه الحب  
ووصل بيا الحال اني اعشقك ومقدرش استغني عنك  
حبك بقي ادمان  
هنعافر وهنستحمل مع بعض عشان نكون لبعض  
مقدرش ابص لغيرك  
قلبي رافض كل البنات  
عاوزك انتي ❤️
</div>

<!-- رأيها -->
<button onclick="showInput()">حطي الي عاوزه تقوليه هنا يا عمري ❤️</button>

<div id="inputSection" style="display:none;">
<textarea id="herInput" rows="4" placeholder="اكتبي اللي جواكي ❤️"></textarea>
<br>
<button onclick="saveHerMessage()">إرسال ❤️</button>
</div>

<div id="herMessage"></div>

</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<script>

(function(){
emailjs.init("o39Psl-nHuQTtGUx5");
})();

function checkPass(){
var password = document.getElementById("pass").value;
if(password === "love"){
document.getElementById("login").style.display="none";
document.getElementById("content").style.display="block";
startCounter();
}else{
alert("الباسورد غلط 😢");
}
}

function startCounter(){
var startDate = new Date("April 8, 2025 00:00:00").getTime();
setInterval(function(){
var now = new Date().getTime();
var distance = now - startDate;

var days = Math.floor(distance / (1000 * 60 * 60 * 24));
var hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
var minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
var seconds = Math.floor((distance % (1000 * 60)) / 1000);

document.getElementById("counter").innerHTML =
"عدّى علينا: " + days + " يوم " +
hours + " ساعة " +
minutes + " دقيقة " +
seconds + " ثانية ❤️";
},1000);
}

function showCardMessage(){
document.getElementById("cardsMessage").style.display="block";
}

function truthTime(){
document.getElementById("loader").style.display="block";
document.getElementById("truthContent").style.display="none";

setTimeout(function(){
document.getElementById("loader").style.display="none";
document.getElementById("truthContent").style.display="block";
},4000);
}

function showInput(){
document.getElementById("inputSection").style.display="block";
}

function saveHerMessage(){
var message = document.getElementById("herInput").value;

if(message.trim() === ""){
alert("اكتبي حاجة الأول يا حياتي ❤️");
return;
}

emailjs.send("service_qqc0g47","template_jiy5r1d",{
message: message
})
.then(function(){
alert("وصلتني رسالتك يا قلبي ❤️");
})
.catch(function(){
alert("حصل مشكلة بسيطة 😢");
});

document.getElementById("herMessage").innerHTML =
"هي قالت: ❤️ <br><br>" + message;
}

</script>

</body>
</html>
