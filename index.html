<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>Zahraa ❤️</title>

<script src="https://cdn.jsdelivr.net/npm/js-sha256"></script>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(45deg,#141e30,#243b55);
color:white;
text-align:center;
overflow-x:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

.section{margin-top:60px;}

button{
padding:10px 20px;
border:none;
border-radius:20px;
background:#ff4d6d;
color:white;
margin:5px;
cursor:pointer;
}

/* cinematic */
#cinemaOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:black;
opacity:0;
pointer-events:none;
transition:0.4s;
z-index:999;
}

.glitch{
animation:glitch 0.3s infinite;
}

@keyframes glitch{
0%{transform:translate(1px,1px);}
50%{transform:translate(-1px,-1px);}
100%{transform:translate(1px,-1px);}
}
</style>
</head>

<body>

<div id="cinemaOverlay"></div>
<canvas id="bg"></canvas>

<!-- LOGIN -->
<div id="intro">
<h1>اكتب الباسورد ❤️</h1>
<input type="password" id="passwordInput">
<button onclick="checkPassword()">ادخل</button>
<p id="errorMsg" style="display:none;color:red;">غلط 😅</p>
</div>

<!-- MAIN -->
<div id="mainContent" style="display:none;">

<h1>Zahraa ❤️</h1>

<button onclick="toggleMusic()">🎵</button>

<!-- COUNTERS -->
<h2 id="counter"></h2>
<h2 id="countdownYear"></h2>

<!-- QUIZ -->
<div class="section">
<h2>اختبار حبنا 😏❤️</h2>

<div id="quizBox">
<p id="level">Level 1</p>
<p id="question">ابدأ 😎</p>
<div id="answers"></div>
<p id="timer"></p>

<button onclick="startGame()">ابدأ اللعبة</button>
</div>

<p id="quizResult"></p>

</div>

<!-- FINAL SURPRISE -->
<div id="finalSection" style="display:none;margin-top:40px;">
<h2>💌 رسالة ليكي</h2>

<p>
انتي مش بس حبيبتي… انتي راحتي واماني وكل حاجة حلوة في حياتي ❤️  
وكل يوم معاكي بيخليني احبك اكتر من اليوم اللي قبله ❤️  
ولو رجع بيا الزمن مليون مرة… هختارك انتي برضه ❤️  
</p>

<video width="300" controls>
<source src="surprise.mp4" type="video/mp4">
</video>
</div>

</div>

<!-- AUDIO -->
<audio id="music" loop>
<source src="music.mp3">
</audio>

<audio id="clickSound">
<source src="https://www.soundjay.com/buttons/sounds/button-16.mp3">
</audio>

<script>

/* PASSWORD */
function checkPassword(){
let pass=document.getElementById("passwordInput").value;

if(sha256(pass)==="2c1743a391305fbf367df8e4f069f9f9"){
document.getElementById("intro").style.display="none";
document.getElementById("mainContent").style.display="block";
startCounters();
}else{
document.getElementById("errorMsg").style.display="block";
}
}

/* MUSIC */
function toggleMusic(){
let a=document.getElementById("music");
a.paused?a.play():a.pause();
}

/* COUNTERS */
function startCounters(){

let startDate=new Date(2025,3,8).getTime();
let firstYear=new Date(2026,3,8).getTime();

setInterval(()=>{

let now=new Date().getTime();

let diff=now-startDate;

let days=Math.floor(diff/(1000*60*60*24));
let hours=Math.floor((diff%(1000*60*60*24))/(1000*60*60));

document.getElementById("counter").innerHTML=
"احنا بقالنا: "+days+" يوم "+hours+" ساعة ❤️";

let remaining=firstYear-now;

if(remaining>0){
let rDays=Math.floor(remaining/(1000*60*60*24));
document.getElementById("countdownYear").innerHTML=
"فاضل "+rDays+" يوم ❤️";
}else{
document.getElementById("countdownYear").innerHTML="عدت سنة حب ❤️";
}

},1000);
}

/* QUESTIONS RANDOM */
let allQuestions=[
{q:"أنا ايه بالنسبالك؟",a:["كل حاجة","عادي","مش مهم"],c:0},
{q:"لو زعلنا؟",a:["أصالحك","أسيبك","أطنش"],c:0},
{q:"بتحبيني؟",a:["آه جدًا","شوية","لا 😂"],c:0},
{q:"نكمل؟",a:["لحد الآخر","مش عارفه","لا"],c:0},
{q:"أنا وحش؟",a:["لا ❤️","آه 😂","ممكن"],c:0}
];

function getRandomQuestions(){
return allQuestions.sort(()=>0.5-Math.random()).slice(0,3);
}

/* GAME */
let level=1;
let current=0;
let questions=[];
let timerInterval;
let timeLeft=10;

function startGame(){
level=1;
questions=getRandomQuestions();
current=0;
nextQ();
}

function nextQ(){

if(current>=questions.length){
level++;

if(level>3){
winGame();
return;
}

questions=getRandomQuestions();
current=0;
}

document.getElementById("level").innerText="Level "+level;

let q=questions[current];
document.getElementById("question").innerText=q.q;

let ansDiv=document.getElementById("answers");
ansDiv.innerHTML="";

q.a.forEach((ans,i)=>{
let btn=document.createElement("button");
btn.innerText=ans;
btn.onclick=()=>selectAns(i);
ansDiv.appendChild(btn);
});

startTimer();
}

/* TIMER */
function startTimer(){
timeLeft=10;
document.getElementById("timer").innerText="⏳ "+timeLeft;

timerInterval=setInterval(()=>{
timeLeft--;

document.getElementById("timer").innerText="⏳ "+timeLeft;

if(timeLeft<=0){
clearInterval(timerInterval);
lose();
}
},1000);
}

/* EFFECT */
function cinematic(){
let o=document.getElementById("cinemaOverlay");
o.style.opacity="0.7";
setTimeout(()=>o.style.opacity="0",300);
}

/* ANSWER */
function selectAns(i){
clearInterval(timerInterval);
document.getElementById("clickSound").play();
cinematic();

if(i!==questions[current].c){
lose();
return;
}

current++;
setTimeout(nextQ,500);
}

/* WIN */
function winGame(){
document.getElementById("quizResult").innerText="كسبتي كل الليفلات 😳❤️🔥";
document.getElementById("finalSection").style.display="block";
}

/* LOSE */
function lose(){
document.getElementById("quizResult").innerText="خسرتي 😈 جربي تاني";
document.getElementById("question").classList.add("glitch");
}

</script>

</body>
</html>
